<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <meta property="og:type" content="website"><meta property="og:title" content="Server 詳情｜ServerBloom"><meta property="og:description" content="查看 Discord Server 詳細介紹、社群特色與加入方式。"><meta property="og:image" content="https://onlyforgame2026.github.io/serverbloom/assets/default-server-banner.svg">
  <link rel="icon" href="assets/default-server-banner.svg" type="image/svg+xml">
  <style>
    :root{--brand:#755cff;--bg:#050914;--panel:#091221;--panel2:#0c1728;--text:#f5f7ff;--muted:#9aa7bc;--line:#1c2b45;--width:1180px}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-width:320px;color:var(--text);background:radial-gradient(circle at 12% 0,color-mix(in srgb,var(--brand) 15%,transparent),transparent 28%),var(--bg);font:15px/1.7 Inter,"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif}a{color:inherit;text-decoration:none}button{font:inherit;color:inherit;cursor:pointer}.shell{width:min(calc(100% - 40px),var(--width));margin:auto}.topbar{position:sticky;top:0;z-index:50;height:62px;border-bottom:1px solid var(--line);background:#050914e8;backdrop-filter:blur(18px)}.nav{height:100%;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:900}.brand-mark{width:32px;height:32px;display:grid;place-items:center;border:2px solid var(--brand);border-radius:10px;color:color-mix(in srgb,var(--brand) 65%,white);box-shadow:0 0 18px color-mix(in srgb,var(--brand) 40%,transparent)}.back{padding:7px 12px;border:1px solid var(--line);border-radius:8px;color:#bec8d8;background:#0a1321}.back:hover{border-color:var(--brand);color:#fff}
    .hero{position:relative;height:clamp(320px,34vw,380px);overflow:hidden;background:#0a1423}.hero-image{width:100%;height:100%;object-fit:cover}.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#02050c99 0%,transparent 40%,#050914 100%)}.hero-copy{position:absolute;z-index:2;left:50%;bottom:28px;width:min(calc(100% - 40px),var(--width));transform:translateX(-50%);display:flex;align-items:end;gap:24px}.server-icon{width:120px;height:120px;flex:none;object-fit:cover;border:4px solid var(--brand);border-radius:30px;background:linear-gradient(145deg,color-mix(in srgb,var(--brand) 80%,white),#08111e);box-shadow:0 0 0 5px #050914,0 0 34px color-mix(in srgb,var(--brand) 50%,transparent),0 18px 36px #000b}.icon-fallback{display:grid;place-items:center;font-size:32px;font-weight:950}.headline{padding-bottom:3px}.headline h1{margin:0;font-size:clamp(29px,4vw,46px);line-height:1.1;letter-spacing:-1px}.headline p{max-width:750px;margin:8px 0 0;color:#c0c9d7;font-size:16px}.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.tag{padding:4px 10px;border:1px solid color-mix(in srgb,var(--brand) 35%,transparent);border-radius:999px;color:color-mix(in srgb,var(--brand) 62%,white);background:color-mix(in srgb,var(--brand) 16%,#08111d);font-size:12px;font-weight:750}
    main{padding:30px 0 70px}.summary-grid{display:grid;grid-template-columns:minmax(0,1.3fr) 310px;gap:22px}.info-card,.action-card,.section{border:1px solid var(--line);border-radius:16px;background:linear-gradient(145deg,#0d1829,#08111f);box-shadow:0 15px 40px #0005}.info-card{padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.fact{min-height:78px;padding:12px;border:1px solid #182842;border-radius:11px;background:#08111d}.fact span{display:block;color:#8e9bb1;font-size:12px}.fact strong{display:block;margin-top:5px;font-size:16px}.action-card{padding:18px;display:grid;gap:10px;align-content:start}.action{min-height:46px;display:flex;align-items:center;justify-content:center;border:1px solid color-mix(in srgb,var(--brand) 68%,#1a2a43);border-radius:9px;background:transparent;font-weight:850}.action.primary{border:0;background:linear-gradient(135deg,color-mix(in srgb,var(--brand) 85%,white),var(--brand));box-shadow:0 10px 24px color-mix(in srgb,var(--brand) 30%,transparent)}.action:hover{transform:translateY(-2px)}.section{margin-top:22px;padding:24px}.section h2{margin:0 0 17px;font-size:22px}.description{color:#bdc6d5;white-space:pre-line;font-size:15px}.description p{margin:0 0 14px}.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.gallery button{height:150px;padding:0;overflow:hidden;border:1px solid #20304a;border-radius:11px;background:#091321}.gallery img{width:100%;height:100%;object-fit:cover;transition:transform .25s ease}.gallery button:hover img{transform:scale(1.04)}
    .ai-review{overflow:hidden;background:radial-gradient(circle at 8% 15%,color-mix(in srgb,var(--score-color) 11%,transparent),transparent 35%),linear-gradient(145deg,#0d1829,#08111f);box-shadow:0 0 26px color-mix(in srgb,var(--score-color) 8%,transparent),0 15px 40px #0005}.ai-review-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.ai-disclaimer{margin:0;color:#77869d;font-size:12px}.ai-layout{display:grid;grid-template-columns:minmax(220px,.65fr) minmax(0,1.6fr);gap:18px}.ai-score-panel,.ai-box{min-width:0;padding:18px;border:1px solid color-mix(in srgb,var(--score-color) 24%,#1c2b45);border-radius:13px;background:#07101dcf}.score-ring{--score-angle:0deg;width:150px;aspect-ratio:1;margin:0 auto 17px;display:grid;place-items:center;border-radius:50%;background:conic-gradient(var(--score-color) var(--score-angle),#17243a 0);box-shadow:0 0 24px color-mix(in srgb,var(--score-color) 25%,transparent);position:relative}.score-ring::after{content:"";position:absolute;inset:10px;border-radius:50%;background:#091321}.score-value{position:relative;z-index:1;text-align:center}.score-value strong{display:block;font-size:38px;line-height:1}.score-value span{color:#8795aa;font-size:12px}.ai-summary{margin:0;color:#bac5d5;text-align:center}.ai-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}.ai-box h3{margin:0 0 11px;font-size:15px}.ai-box ul{margin:0;padding:0;list-style:none;color:#bac5d5}.ai-box li{display:flex;align-items:flex-start;gap:8px;overflow-wrap:anywhere}.ai-box li+li{margin-top:7px}.ai-icon-good{color:#42dd79}.ai-icon-weak{color:#ffae4d}.ai-icon-tip{color:#fbd35a}.suitable-box{grid-column:1/-1}.suitable-tags{display:flex;flex-wrap:wrap;gap:8px}.suitable-tags .tag{font-size:13px}.ai-missing{padding:28px;text-align:center;color:#95a2b6;border:1px dashed #2a3952;border-radius:12px;background:#07101c}.recommendations{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}.recommend{overflow:hidden;border:1px solid #1b2a43;border-radius:12px;background:#08111e;transition:.2s ease}.recommend:hover{transform:translateY(-4px);border-color:var(--brand);box-shadow:0 12px 28px #0007}.recommend img{width:100%;height:100px;object-fit:cover}.recommend-copy{padding:12px}.recommend h3{margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px}.recommend p{margin:5px 0 0;color:#8997ad;font-size:12px}.empty{padding:38px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px}.error-page{min-height:calc(100vh - 62px);display:grid;place-items:center;text-align:center}.error-page h1{margin:0}.error-page p{color:var(--muted)}
    .lightbox{position:fixed;z-index:100;inset:0;padding:30px;display:grid;place-items:center;background:#02050ce8;backdrop-filter:blur(10px)}.lightbox[hidden]{display:none}.lightbox img{max-width:min(1200px,92vw);max-height:86vh;border-radius:12px;box-shadow:0 25px 80px #000}.lightbox-close{position:absolute;right:24px;top:18px;width:42px;height:42px;border:1px solid #ffffff30;border-radius:50%;background:#08111dcc;font-size:25px}
    @media(max-width:900px){.summary-grid{grid-template-columns:1fr}.info-card{grid-template-columns:repeat(2,1fr)}.gallery{grid-template-columns:repeat(2,1fr)}.recommendations{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:620px){body{overflow-x:hidden;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}.shell{width:min(calc(100% - 24px),var(--width))}.hero{height:390px}.hero-copy{width:calc(100% - 24px);bottom:20px;align-items:flex-start;flex-direction:column;gap:12px}.server-icon{width:88px;height:88px;border-radius:22px}.headline{min-width:0}.headline h1{font-size:28px;overflow-wrap:anywhere}.headline p{font-size:14px}.info-card{grid-template-columns:1fr;padding:13px}.fact{min-height:70px}.action{min-height:48px}.section{min-width:0;padding:17px}.gallery{display:flex;overflow-x:auto;scroll-snap-type:x mandatory}.gallery button{width:82%;height:auto;aspect-ratio:16/9;flex:none;scroll-snap-align:start}.ai-layout,.ai-cards,.recommendations{grid-template-columns:1fr}.ai-score-panel{order:-1}.suitable-box{grid-column:auto}.ai-review-head{align-items:flex-start;flex-direction:column}.score-ring{width:132px}.recommend{display:grid;grid-template-columns:108px minmax(0,1fr)}.recommend img{height:100%}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}.score-ring{box-shadow:none}.server-icon{box-shadow:0 0 0 4px #050914}}
  </style>
  <style>body{min-width:0}</style>
  <link rel="stylesheet" href="assets/css/detail-v2.css">
</head>
<body>
  <header class="topbar"><div class="shell nav"><a class="brand" href="index.html"><span class="brand-mark">∞</span>ServerBloom</a><a class="back" href="index.html">← 返回探索</a></div></header>
  <div id="app"><div class="error-page"><div><h1>正在載入 Server…</h1><p>請稍候</p></div></div></div>
  <div class="lightbox" id="lightbox" hidden><button class="lightbox-close" id="lightboxClose" aria-label="關閉">×</button><img id="lightboxImage" alt="Gallery 放大圖片"></div>
  <script src="assets/js/server-data.js?v=banner-sync-v3"></script>
  <script src="assets/js/server-banner.js?v=banner-sync-v1"></script>
  <script src="assets/js/discord-app.js?v=hotfix-v1" defer></script>
  <script>
  (()=>{'use strict';
    const app=document.querySelector('#app'),lightbox=document.querySelector('#lightbox'),lightboxImage=document.querySelector('#lightboxImage');
    const esc=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const attr=esc;
    const fallbackBanner=ServerBloomBanner.DEFAULT_BANNER;
    const galleryFallback=[
      'https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1000&q=82',
      'https://images.unsplash.com/photo-1542751110-97427bbecf20?auto=format&fit=crop&w=1000&q=82',
      'https://images.unsplash.com/photo-1598550476439-6847785fcea6?auto=format&fit=crop&w=1000&q=82',
      'https://images.unsplash.com/photo-1560419015-7c427e8ae5ba?auto=format&fit=crop&w=1000&q=82'
    ];
    const list=value=>(Array.isArray(value)?value:String(value||'').split(/[、,，]/)).map(item=>String(item).trim()).filter(Boolean);
    const initials=name=>String(name||'SB').trim().split(/\s+/).map(word=>word[0]).join('').slice(0,2).toUpperCase()||'SB';
    const number=value=>Number(value||0).toLocaleString('zh-TW');
    const date=value=>{const parsed=new Date(value);return Number.isNaN(parsed.getTime())?'未提供':parsed.toLocaleDateString('zh-TW')};
    function identity(server){return String(server.id||server.slug||'').trim().toLowerCase().replace(/[^a-z0-9-]/g,'')}
    function iconMarkup(server){return server.icon?`<img class="server-icon" src="${attr(server.icon)}" alt="${attr(server.name)} Icon" width="120" height="120">`:`<div class="server-icon icon-fallback" aria-label="${attr(server.name)} Icon">${esc(initials(server.name))}</div>`}
    function meta(name,content){let element=document.querySelector(`meta[${name.startsWith('og:')?'property':'name'}="${name}"]`);if(!element){element=document.createElement('meta');element.setAttribute(name.startsWith('og:')?'property':'name',name);document.head.appendChild(element)}element.setAttribute('content',String(content||''))}
    function updateSeo(server){const description=server.shortDescription||server.description||'查看 Discord Server 詳細介紹。',image=new URL(resolveServerBanner(server),location.href).href;document.title=`${server.name}｜ServerBloom`;meta('description',description);meta('og:title',`${server.name}｜ServerBloom`);meta('og:description',description);meta('og:image',image)}
    function detailParagraphs(value){const paragraphs=Array.isArray(value)?value:String(value||'').split(/\n{2,}/);return paragraphs.filter(Boolean).map(text=>`<p>${esc(text)}</p>`).join('')||'<p>這個社群尚未提供詳細介紹。</p>'}
    function scoreColor(score){return score>=90?'#39db78':score>=75?'#785cff':score>=60?'#ff9d3d':'#ff4d67'}
    function reviewList(items,icon,iconClass){return list(items).map(item=>`<li><span class="${iconClass}">${icon}</span><span>${esc(item)}</span></li>`).join('')}
    function aiReviewMarkup(review){
      if(!review||typeof review!=='object')return `<section class="section ai-review"><div class="ai-review-head"><h2>AI 經營分析 <span class="tag">BETA</span></h2><p class="ai-disclaimer">此分析為平台內容整理與經營建議，不代表官方認證。</p></div><div class="ai-missing">目前尚未建立 AI 經營分析。</div></section>`;
      const score=Math.max(0,Math.min(100,Number(review.score)||0)),scoreTone=scoreColor(score),angle=`${score*3.6}deg`;
      return `<section class="section ai-review" style="--score-color:${scoreTone}"><div class="ai-review-head"><h2>AI 經營分析 <span class="tag">BETA</span></h2><p class="ai-disclaimer">此分析為平台內容整理與經營建議，不代表官方認證。</p></div><div class="ai-layout"><div class="ai-score-panel"><div class="score-ring" style="--score-angle:${angle}"><div class="score-value"><strong>${score}</strong><span>/ 100</span></div></div><p class="ai-summary">${esc(review.summary||'目前沒有分析摘要。')}</p></div><div class="ai-cards"><div class="ai-box"><h3>優點</h3><ul>${reviewList(review.strengths,'✔','ai-icon-good')}</ul></div><div class="ai-box"><h3>可改善項目</h3><ul>${reviewList(review.weaknesses,'△','ai-icon-weak')}</ul></div><div class="ai-box"><h3>AI 建議</h3><ul>${reviewList(review.suggestions,'💡','ai-icon-tip')}</ul></div><div class="ai-box suitable-box"><h3>適合對象</h3><div class="suitable-tags">${list(review.suitableFor).map(item=>`<span class="tag">${esc(item)}</span>`).join('')}</div></div></div></div></section>`
    }
    function render(server,servers){
      updateSeo(server);
      const brand=/^#[0-9a-f]{6}$/i.test(server.primaryColor||server.color||'')?(server.primaryColor||server.color):'#755cff',members=server.countsUnknown?1:Number(server.members??server.memberCount??0),online=server.countsUnknown?1:Number(server.online??server.onlineCount??0);document.documentElement.style.setProperty('--brand',brand);document.title=`${server.name}｜ServerBloom`;
      const gallery=list(server.gallery).slice(0,8);while(gallery.length<4)gallery.push(galleryFallback[gallery.length]);
      const related=servers.filter(item=>identity(item)!==identity(server)&&item.category===server.category).slice(0,4);
      app.innerHTML=`<section class="hero"><img class="hero-image" src="${attr(server.banner||fallbackBanner)}" alt="${attr(server.name)} Banner"><div class="hero-copy">${iconMarkup(server)}<div class="headline"><h1>${esc(server.name)}</h1><p>${esc(server.shortDescription||server.description||'歡迎來到這個 Discord 社群')}</p><div class="tags">${list(server.tags).map(tag=>`<span class="tag">${esc(tag)}</span>`).join('')}<span class="tag">${esc(server.category||'其他')}</span>${server.isNew===true||members===0?'<span class="tag">✨ 新社群</span>':''}</div></div></div></section><main class="shell"><div class="summary-grid"><section class="info-card"><div class="fact"><span>👥 成員數</span><strong>${number(members)} 位成員</strong></div><div class="fact"><span>🟢 在線數</span><strong>${number(online)} 人在線</strong></div><div class="fact"><span>📅 建立日期</span><strong>${date(server.createdAt)}</strong></div><div class="fact"><span>🌎 地區</span><strong>${esc(server.region||'台港澳')}</strong></div><div class="fact"><span>🎮 遊戲分類</span><strong>${esc(server.game||server.category||'其他')}</strong></div><div class="fact"><span>🎤 是否需要 Mic</span><strong>${server.micRequired===true?'需要':server.micRequired===false?'不強制':'依活動而定'}</strong></div></section><aside class="action-card"><a class="action primary" href="${attr(server.inviteUrl)}" target="_blank" rel="noopener noreferrer">加入 Discord</a><button class="action" id="shareButton">分享 Server</button><button class="action" id="copyButton">複製邀請</button></aside></div><section class="section"><h2>Server 詳細介紹</h2><div class="description">${detailParagraphs(server.longDescription||server.description)}</div></section><section class="section"><h2>Gallery</h2><div class="gallery">${gallery.map((image,index)=>`<button data-gallery="${attr(image)}" aria-label="放大第 ${index+1} 張圖片"><img src="${attr(image)}" alt="${attr(server.name)} Gallery ${index+1}" loading="lazy"></button>`).join('')}</div></section><section class="section"><h2>AI Review <span class="tag">BETA</span></h2><div class="ai-grid"><div class="ai-box"><h3>適合這些玩家</h3><ul><li><span class="check">✔</span> 新手玩家</li><li><span class="check">✔</span> 晚上活躍</li><li><span class="check">✔</span> ${esc(server.game||server.category||'遊戲')}玩家</li><li><span class="check">✔</span> 想找固定隊友</li></ul></div><div class="ai-box"><h3>AI 建議</h3><ul><li>增加固定活動時間。</li><li>補充更完整的社群規則介紹。</li><li>定期歡迎與引導新成員。</li></ul></div></div></section><section class="section"><h2>推薦其他 Server</h2><div class="recommendations">${related.length?related.map(item=>`<a class="recommend" href="server.html?id=${encodeURIComponent(identity(item))}"><img src="${attr(item.banner||fallbackBanner)}" alt="${attr(item.name)}" loading="lazy"><div class="recommend-copy"><h3>${esc(item.name)}</h3><p>${esc(item.category||'其他')} · ${number(item.members??item.memberCount??0)} 位成員</p></div></a>`).join(''):'<div class="empty">目前沒有同分類的其他 Server。</div>'}</div></section></main>`;
      if(server.countsUnknown){const facts=document.querySelectorAll('.info-card .fact strong');if(facts[0])facts[0].textContent='未公開';if(facts[1])facts[1].textContent='未公開'}
      document.querySelectorAll('.recommend-copy p').forEach((element,index)=>{if(related[index]?.countsUnknown)element.textContent=`${related[index].category||'其他'} · 成員數未公開`});
      const legacyAi=[...document.querySelectorAll('.section')].find(section=>section.querySelector('h2')?.textContent.includes('AI Review'));if(legacyAi)legacyAi.outerHTML=aiReviewMarkup(server.aiReview);
      const heroImage=document.querySelector('.hero-image');ServerBloomBanner.bindBannerFallback(heroImage,server);heroImage.src=resolveServerBanner(server);
      document.querySelectorAll('.recommend img').forEach((image,index)=>{const item=related[index];if(item){ServerBloomBanner.bindBannerFallback(image,item);image.src=resolveServerBanner(item)}});
      document.querySelectorAll('[data-gallery]').forEach(button=>button.addEventListener('click',()=>{lightboxImage.src=button.dataset.gallery;lightbox.hidden=false;document.body.style.overflow='hidden'}));
      document.querySelector('#copyButton').addEventListener('click',async event=>{try{await navigator.clipboard.writeText(server.inviteUrl);event.currentTarget.textContent='已複製邀請'}catch{window.prompt('請複製邀請連結：',server.inviteUrl)}});
      document.querySelector('#shareButton').addEventListener('click',async event=>{const data={title:`${server.name}｜ServerBloom`,text:server.shortDescription||server.description,url:location.href};try{if(navigator.share)await navigator.share(data);else{await navigator.clipboard.writeText(location.href);event.currentTarget.textContent='已複製分享連結'}}catch{window.prompt('請複製分享連結：',location.href)}})
    }
    function showError(message){app.innerHTML=`<div class="error-page"><div><h1>找不到 Server</h1><p>${esc(message)}</p><a class="back" href="index.html">返回探索</a></div></div>`}
    async function start(){const id=new URLSearchParams(location.search).get('id');if(!id){showError('網址缺少 id 參數。');return}try{const [servers]=await Promise.all([ServerBloomData.loadServers(),ServerBloomBanner.loadBannerPresets().catch(()=>[])]),requested=String(id).toLowerCase().replaceAll('-',''),source=servers.find(item=>identity(item).replaceAll('-','')===requested);if(!source){showError(`沒有找到 id 為「${id}」的 Server。`);return}render({...source},servers)}catch(error){showError(`${error.message}。請透過本地伺服器預覽，不要直接使用 file:// 開啟。`)}}
    function closeLightbox(){lightbox.hidden=true;lightboxImage.src='';document.body.style.overflow=''}
    document.querySelector('#lightboxClose').addEventListener('click',closeLightbox);lightbox.addEventListener('click',event=>{if(event.target===lightbox)closeLightbox()});document.addEventListener('keydown',event=>{if(event.key==='Escape')closeLightbox()});start();
  })();
  </script>
</body>
</html>
