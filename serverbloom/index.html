<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- 避免瀏覽器持續顯示舊版本 -->
  <meta
    http-equiv="Cache-Control"
    content="no-cache, no-store, must-revalidate"
  />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>ServerBloom｜社群上船</title>

  <meta
    name="description"
    content="ServerBloom Discord 社群分享平台。填寫社群資料後即可確認上船。"
  />

  <style>
    :root {
      --bg-1: #31104d;
      --bg-2: #5f214f;

      --panel: rgba(18, 8, 31, 0.86);
      --text: #ffffff;
      --muted: #d9cce3;
      --line: rgba(255, 255, 255, 0.14);

      --purple: #873cf0;
      --pink: #ed62b0;

      --success: #62e0a1;
      --danger: #ff8ca5;

      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;

      color: var(--text);

      font-family:
        Arial,
        "Microsoft JhengHei",
        sans-serif;

      background:
        radial-gradient(
          circle at 10% 10%,
          rgba(119, 48, 255, 0.26),
          transparent 30%
        ),
        radial-gradient(
          circle at 90% 10%,
          rgba(255, 84, 166, 0.22),
          transparent 32%
        ),
        linear-gradient(
          135deg,
          var(--bg-1),
          var(--bg-2)
        );

      background-attachment: fixed;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 30px 0 60px;
    }

    .version {
      display: inline-block;

      margin-bottom: 14px;
      padding: 7px 11px;

      border: 1px solid var(--line);
      border-radius: 999px;

      color: var(--muted);
      background: rgba(255, 255, 255, 0.07);

      font-size: 12px;
    }

    .shell {
      display: grid;
      grid-template-columns: 0.72fr 1.28fr;
      gap: 28px;

      padding: 36px;

      border: 1px solid var(--line);
      border-radius: 34px;

      background: rgba(255, 255, 255, 0.05);

      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.3);
    }

    .intro h1 {
      margin: 0 0 16px;

      font-size: clamp(38px, 6vw, 62px);
      line-height: 1.12;
    }

    .intro p {
      margin: 0 0 20px;

      color: var(--muted);

      font-size: 17px;
      line-height: 1.9;
    }

    .notice {
      padding: 15px 16px;

      border: 1px solid var(--line);
      border-radius: 16px;

      color: #f1eaf7;
      background: rgba(255, 255, 255, 0.06);

      line-height: 1.75;
    }

    .form-box {
      display: grid;
      gap: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 0.52fr;
      gap: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;

      border: 1px solid var(--line);
      border-radius: 17px;

      color: #ffffff;
      background: rgba(17, 6, 28, 0.82);

      outline: none;
    }

    input,
    select {
      min-height: 64px;
      padding: 0 18px;
    }

    textarea {
      min-height: 150px;
      padding: 17px 18px;

      resize: vertical;
      line-height: 1.7;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(237, 98, 176, 0.85);

      box-shadow:
        0 0 0 4px rgba(237, 98, 176, 0.12);
    }

    input::placeholder,
    textarea::placeholder {
      color: #b9a9c5;
    }

    option {
      color: #111111;
    }

    .color-box {
      min-height: 72px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;

      padding: 10px 16px;

      border: 1px solid var(--line);
      border-radius: 17px;

      color: var(--muted);
      background: rgba(17, 6, 28, 0.82);
    }

    input[type="color"] {
      width: 82px;
      min-height: 48px;

      padding: 5px;

      cursor: pointer;
    }

    .preview {
      position: relative;
      overflow: hidden;

      min-height: 198px;
      padding: 26px 28px;

      border: 2px solid var(--card-color, #d1a20b);
      border-radius: 24px;

      background: rgba(8, 5, 24, 0.92);

      box-shadow:
        0 0 30px
        color-mix(
          in srgb,
          var(--card-color, #d1a20b) 35%,
          transparent
        );
    }

    .preview::before {
      content: "";

      position: absolute;
      inset: 0 auto 0 0;

      width: 12px;

      background: var(--card-color, #d1a20b);
    }

    .preview h2 {
      margin: 0 0 8px;

      font-size: 28px;
      overflow-wrap: anywhere;
    }

    .preview .category {
      display: inline-block;

      margin-bottom: 13px;
      padding: 5px 10px;

      border-radius: 999px;

      color: #eee5f4;
      background: rgba(255, 255, 255, 0.08);

      font-size: 13px;
    }

    .preview p {
      margin: 0;

      color: var(--muted);

      white-space: pre-wrap;
      overflow-wrap: anywhere;

      line-height: 1.7;
    }

    .submit {
      min-height: 68px;

      border: 0;
      border-radius: 18px;

      color: #ffffff;

      background:
        linear-gradient(
          90deg,
          var(--purple),
          var(--pink)
        );

      font-size: 20px;
      font-weight: 900;

      cursor: pointer;

      box-shadow:
        0 18px 35px rgba(135, 60, 240, 0.28);

      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .submit:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .submit:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .status {
      min-height: 30px;
      margin: 0;

      color: var(--muted);

      font-size: 17px;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .list-section {
      margin-top: 30px;
      padding: 28px;

      border: 1px solid var(--line);
      border-radius: 26px;

      background: rgba(255, 255, 255, 0.05);
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;

      margin-bottom: 18px;
    }

    .list-head h2 {
      margin: 0;
    }

    .clear {
      min-height: 42px;
      padding: 0 14px;

      border: 1px solid var(--line);
      border-radius: 12px;

      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);

      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .card {
      position: relative;
      overflow: hidden;

      padding: 21px;

      border: 1px solid var(--line);
      border-radius: 20px;

      background: var(--panel);
    }

    .card::before {
      content: "";

      position: absolute;
      inset: 0 auto 0 0;

      width: 7px;

      background: var(--item-color);
    }

    .card h3 {
      margin: 0;

      font-size: 23px;
      overflow-wrap: anywhere;
    }

    .card-tag {
      display: inline-block;

      margin-top: 8px;
      padding: 5px 9px;

      border-radius: 999px;

      color: #e5d9ec;
      background: rgba(255, 255, 255, 0.07);

      font-size: 12px;
    }

    .card p {
      margin: 14px 0 18px;

      color: var(--muted);

      white-space: pre-wrap;
      overflow-wrap: anywhere;

      line-height: 1.65;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;

      flex-wrap: wrap;
    }

    .time {
      color: #a997b6;
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .join,
    .delete {
      min-height: 40px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 0 13px;

      border-radius: 11px;

      font-weight: 800;
      cursor: pointer;
    }

    .join {
      color: #ffffff;

      background:
        linear-gradient(
          90deg,
          var(--purple),
          var(--pink)
        );

      text-decoration: none;
    }

    .delete {
      border: 1px solid var(--line);

      color: #ffd0dc;
      background: rgba(255, 255, 255, 0.05);
    }

    .empty {
      grid-column: 1 / -1;

      padding: 28px;

      border: 1px dashed var(--line);
      border-radius: 16px;

      color: #bbaac8;
      text-align: center;
    }

    .footnote {
      margin-top: 15px;

      color: #b7a6c3;

      font-size: 13px;
      line-height: 1.65;
    }

    @media (max-width: 900px) {
      .shell,
      .cards {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .shell {
        padding: 22px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .list-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .clear {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <div class="version">
      ServerBloom 櫻花龐克版 v3.0
    </div>

    <section class="shell">

      <div class="intro">

        <h1>
          讓你的社群<br>
          在這裡盛開
        </h1>

        <p>
          填寫社群資料後，直接按下「確認上船」。
          不需要前往 Only for Game 審核，
          也不會再卡在跳轉畫面。
        </p>

        <div class="notice">
          ServerBloom 並非 Discord 官方網站，
          也未獲 Discord 贊助或背書。
        </div>

      </div>

      <form
        id="serverForm"
        class="form-box"
        novalidate
      >

        <div class="row">

          <input
            id="serverName"
            type="text"
            maxlength="60"
            placeholder="社群名稱"
            autocomplete="off"
            required
          />

          <select
            id="serverCategory"
            required
          >
            <option value="">選擇分類</option>
            <option value="遊戲">遊戲</option>
            <option value="聊天交友">聊天交友</option>
            <option value="創作">創作</option>
            <option value="技術">技術</option>
            <option value="學習">學習</option>
            <option value="其他">其他</option>
          </select>

        </div>

        <input
          id="serverInvite"
          type="url"
          inputmode="url"
          autocomplete="off"
          placeholder="https://discord.gg/你的邀請碼"
          required
        />

        <textarea
          id="serverDescription"
          maxlength="1000"
          placeholder="社群理念／介紹"
          required
        ></textarea>

        <label class="color-box">

          <span>
            社群卡片框架／背景顏色
          </span>

          <input
            id="serverColor"
            type="color"
            value="#d1a20b"
          />

        </label>

        <aside
          id="serverPreview"
          class="preview"
          style="--card-color: #d1a20b"
        >

          <h2 id="previewName">
            你的社群名稱
          </h2>

          <span
            id="previewCategory"
            class="category"
          >
            尚未選擇分類
          </span>

          <p id="previewDescription">
            你的社群理念與介紹會顯示在這裡。
          </p>

        </aside>

        <button
          id="submitButton"
          class="submit"
          type="submit"
        >
          確認上船
        </button>

        <p
          id="submitStatus"
          class="status"
          role="status"
          aria-live="polite"
        ></p>

      </form>

    </section>

    <section class="list-section">

      <div class="list-head">

        <h2>
          已確認上船的社群
        </h2>

        <button
          id="clearButton"
          class="clear"
          type="button"
        >
          清除本機測試資料
        </button>

      </div>

      <div
        id="serverList"
        class="cards"
      ></div>

      <div class="footnote">
        目前版本把投稿保存在填表者自己的瀏覽器。
        不會跳轉，也不會卡住。
        若要讓所有訪客看到相同的公開社群名單，
        仍需要串接共用資料庫。
      </div>

    </section>

  </main>

  <script>
    (() => {
      "use strict";

      /*
        這份程式沒有：
        window.open()
        window.location.href
        setTimeout()

        因此不會自動跳轉至 Only for Game。
      */

      const STORAGE_KEY =
        "serverBloomSubmissionsV22";

      const form =
        document.getElementById("serverForm");

      const nameInput =
        document.getElementById("serverName");

      const categoryInput =
        document.getElementById("serverCategory");

      const inviteInput =
        document.getElementById("serverInvite");

      const descriptionInput =
        document.getElementById("serverDescription");

      const colorInput =
        document.getElementById("serverColor");

      const preview =
        document.getElementById("serverPreview");

      const previewName =
        document.getElementById("previewName");

      const previewCategory =
        document.getElementById("previewCategory");

      const previewDescription =
        document.getElementById("previewDescription");

      const submitButton =
        document.getElementById("submitButton");

      const status =
        document.getElementById("submitStatus");

      const serverList =
        document.getElementById("serverList");

      const clearButton =
        document.getElementById("clearButton");


      function setStatus(
        message,
        type = ""
      ) {
        status.textContent =
          message;

        status.className =
          "status";

        if (type) {
          status.classList.add(type);
        }
      }


      function updatePreview() {
        const name =
          nameInput.value.trim();

        const category =
          categoryInput.value;

        const description =
          descriptionInput.value.trim();

        const color =
          colorInput.value || "#d1a20b";

        previewName.textContent =
          name || "你的社群名稱";

        previewCategory.textContent =
          category || "尚未選擇分類";

        previewDescription.textContent =
          description ||
          "你的社群理念與介紹會顯示在這裡。";

        preview.style.setProperty(
          "--card-color",
          color
        );
      }


      function isDiscordInvite(value) {
        try {
          const url =
            new URL(value);

          const host =
            url.hostname.toLowerCase();

          const path =
            url.pathname.replace(/^\/+/, "");

          if (
            host === "discord.gg" ||
            host === "www.discord.gg"
          ) {
            return path.length > 0;
          }

          if (
            host === "discord.com" ||
            host === "www.discord.com"
          ) {
            return (
              path.startsWith("invite/") &&
              path.length > "invite/".length
            );
          }

          return false;

        } catch (error) {
          return false;
        }
      }


      function readServers() {
        try {
          const saved =
            localStorage.getItem(
              STORAGE_KEY
            );

          if (!saved) {
            return [];
          }

          const parsed =
            JSON.parse(saved);

          return Array.isArray(parsed)
            ? parsed
            : [];

        } catch (error) {
          console.error(
            "讀取資料失敗：",
            error
          );

          return [];
        }
      }


      function saveServers(servers) {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify(servers)
        );
      }


      function createTextElement(
        tag,
        className,
        text
      ) {
        const element =
          document.createElement(tag);

        if (className) {
          element.className =
            className;
        }

        element.textContent =
          text;

        return element;
      }


      function renderServers() {
        const servers =
          readServers().sort(
            (first, second) =>
              second.createdAt -
              first.createdAt
          );

        serverList.replaceChildren();

        if (servers.length === 0) {
          const empty =
            createTextElement(
              "div",
              "empty",
              "目前還沒有本機投稿。送出表單後，社群會立刻顯示在這裡。"
            );

          serverList.appendChild(empty);

          return;
        }

        for (const server of servers) {
          const card =
            document.createElement(
              "article"
            );

          card.className =
            "card";

          card.style.setProperty(
            "--item-color",
            server.color || "#d1a20b"
          );

          const title =
            createTextElement(
              "h3",
              "",
              server.name
            );

          const category =
            createTextElement(
              "span",
              "card-tag",
              server.category
            );

          const description =
            createTextElement(
              "p",
              "",
              server.description
            );

          const footer =
            document.createElement(
              "div"
            );

          footer.className =
            "card-footer";

          const time =
            createTextElement(
              "span",
              "time",
              new Date(
                server.createdAt
              ).toLocaleString(
                "zh-TW"
              )
            );

          const actions =
            document.createElement(
              "div"
            );

          actions.className =
            "actions";

          const joinButton =
            document.createElement(
              "a"
            );

          joinButton.className =
            "join";

          joinButton.href =
            server.inviteUrl;

          joinButton.target =
            "_blank";

          joinButton.rel =
            "noopener noreferrer";

          joinButton.textContent =
            "加入 Discord";

          const deleteButton =
            document.createElement(
              "button"
            );

          deleteButton.className =
            "delete";

          deleteButton.type =
            "button";

          deleteButton.textContent =
            "刪除";

          deleteButton.addEventListener(
            "click",
            () => {
              const confirmed =
                window.confirm(
                  `確定要刪除「${server.name}」嗎？`
                );

              if (!confirmed) {
                return;
              }

              const remainingServers =
                readServers().filter(
                  (item) =>
                    item.id !== server.id
                );

              saveServers(
                remainingServers
              );

              renderServers();

              setStatus(
                "已刪除這筆本機投稿。",
                "success"
              );
            }
          );

          actions.append(
            joinButton,
            deleteButton
          );

          footer.append(
            time,
            actions
          );

          card.append(
            title,
            category,
            description,
            footer
          );

          serverList.appendChild(
            card
          );
        }
      }


      form.addEventListener(
        "input",
        updatePreview
      );


      form.addEventListener(
        "change",
        updatePreview
      );


      form.addEventListener(
        "submit",
        async (event) => {
          event.preventDefault();

          submitButton.disabled =
            true;

          submitButton.textContent =
            "正在確認…";

          setStatus("");

          try {
            const name =
              nameInput.value.trim();

            const category =
              categoryInput.value;

            const inviteUrl =
              inviteInput.value.trim();

            const description =
              descriptionInput.value.trim();

            const color =
              colorInput.value ||
              "#d1a20b";


            if (
              !name ||
              !category ||
              !inviteUrl ||
              !description
            ) {
              throw new Error(
                "請完整填寫社群名稱、分類、Discord 邀請網址與社群介紹。"
              );
            }


            if (
              !isDiscordInvite(
                inviteUrl
              )
            ) {
              throw new Error(
                "請填入有效的 Discord 邀請網址。"
              );
            }


            const servers =
              readServers();


            const duplicate =
              servers.some(
                (server) =>
                  server.inviteUrl
                    .toLowerCase() ===
                  inviteUrl
                    .toLowerCase()
              );


            if (duplicate) {
              throw new Error(
                "這個 Discord 邀請網址已經上船，不能重複投稿。"
              );
            }


            const newServer = {
              id:
                typeof crypto !==
                  "undefined" &&
                typeof crypto.randomUUID ===
                  "function"
                  ? crypto.randomUUID()
                  : `${Date.now()}-${Math.random()}`,

              name,
              category,
              inviteUrl,
              description,
              color,

              createdAt:
                Date.now()
            };


            servers.push(
              newServer
            );


            saveServers(
              servers
            );


            renderServers();


            const copyText = [
              `社群名稱：${name}`,
              `分類：${category}`,
              `Discord：${inviteUrl}`,
              `社群介紹：${description}`
            ].join("\n");


            try {
              await navigator.clipboard.writeText(
                copyText
              );

              setStatus(
                "確認成功，歡迎上船！投稿內容也已複製。",
                "success"
              );

            } catch (clipboardError) {
              console.warn(
                "瀏覽器未允許剪貼簿：",
                clipboardError
              );

              setStatus(
                "確認成功，歡迎上船！",
                "success"
              );
            }


            form.reset();

            colorInput.value =
              "#d1a20b";

            updatePreview();

            serverList.scrollIntoView({
              behavior: "smooth",
              block: "start"
            });

          } catch (error) {
            console.error(error);

            setStatus(
              `確認失敗：${error.message}`,
              "error"
            );

          } finally {
            submitButton.disabled =
              false;

            submitButton.textContent =
              "確認上船";
          }
        }
      );


      clearButton.addEventListener(
        "click",
        () => {
          const servers =
            readServers();

          if (servers.length === 0) {
            setStatus(
              "目前沒有可清除的本機投稿。"
            );

            return;
          }

          const confirmed =
            window.confirm(
              "確定要清除這台裝置上的所有測試投稿嗎？"
            );

          if (!confirmed) {
            return;
          }

          localStorage.removeItem(
            STORAGE_KEY
          );

          renderServers();

          setStatus(
            "已清除全部本機測試資料。",
            "success"
          );
        }
      );


      updatePreview();
      renderServers();
    })();
  </script>
