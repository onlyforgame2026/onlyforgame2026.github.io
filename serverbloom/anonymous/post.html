<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>匿名文章全文｜ServerBloom</title>

  <link rel="stylesheet" href="assets/anonymous.css">

  <style>
    .post-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 22px;
      align-items: start;
    }

    .post-main,
    .related-panel,
    .comments-section {
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(
          150deg,
          rgba(255, 143, 202, 0.07),
          rgba(185, 156, 255, 0.07)
        ),
        var(--panel);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.3);
    }

    .post-main {
      overflow: hidden;
    }

    .post-accent {
      height: 9px;
      background: linear-gradient(
        90deg,
        var(--sakura),
        var(--lavender)
      );
    }

    .post-body {
      padding: 28px;
    }

    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .post-title {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.3;
    }

    .post-author {
      margin-top: 14px;
      color: var(--muted);
    }

    .post-content {
      margin-top: 28px;
      color: #ddd5ea;
      font-size: 17px;
      line-height: 2;
      white-space: pre-wrap;
    }

    .post-actions {
      margin-top: 30px;
      padding-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-top: 1px solid var(--line);
    }

    .post-action {
      min-height: 42px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--lavender-soft);
      background: var(--panel-soft);
    }

    .related-panel {
      position: sticky;
      top: 82px;
      padding: 18px;
    }

    .related-panel h2 {
      margin: 0 0 14px;
      font-size: 19px;
    }

    .related-list {
      display: grid;
      gap: 10px;
    }

    .related-item {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(7, 7, 19, 0.58);
    }

    .related-item strong {
      display: block;
      line-height: 1.5;
    }

    .related-item small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
    }

    .comments-section {
      margin-top: 22px;
      padding: 24px;
    }

    .comments-section h2 {
      margin: 0 0 18px;
    }

    .comment-form {
      display: grid;
      gap: 11px;
    }

    .comment-field {
      width: 100%;
      min-height: 46px;
      padding: 11px 13px;
      color: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: 0;
      background: #090819;
    }

    textarea.comment-field {
      min-height: 110px;
      resize: vertical;
    }

    .comment-button {
      min-height: 46px;
      border: 0;
      border-radius: 10px;
      color: white;
      background: linear-gradient(
        135deg,
        var(--sakura),
        var(--purple)
      );
      font-weight: 850;
    }

    .comment-preview {
      margin-top: 22px;
      padding: 18px 0 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .post-layout {
        grid-template-columns: 1fr;
      }

      .related-panel {
        position: static;
      }
    }

    @media (max-width: 680px) {
      .post-body,
      .comments-section {
        padding: 19px;
      }
    }
  </style>
</head>

<body>
  <header class="anonymous-header">
    <nav class="anonymous-nav">
      <a class="anonymous-brand" href="./">
        Server<span>Bloom</span> 匿名文章
      </a>

      <a class="back-link" href="./">
        ← 返回文章列表
      </a>
    </nav>
  </header>

  <main class="anonymous-main">
    <div class="post-layout">

      <article class="post-main">
        <div class="post-accent"></div>

        <div class="post-body">
          <div class="post-meta">
            <span class="card-label">🟡 呵護模式</span>
            <span class="card-label">心情</span>
          </div>

          <h1 class="post-title">
            今天其實有點累，只是不知道能和誰說
          </h1>

          <div class="post-author">
            匿名使用者・2026/07/20
          </div>

          <div class="post-content">
最近發生了很多事情，表面上看起來沒有問題，但心裡一直覺得很疲倦。

我沒有想要立刻得到答案，只是希望有人願意安靜地聽完。

這篇文章目前是文章全文頁的版面預覽。之後會依照網址中的文章 ID，自動讀取對應的文章資料。
          </div>

          <div class="post-actions">
            <button class="post-action" type="button">😎</button>
            <button class="post-action" type="button">😊</button>
            <button class="post-action" type="button">❤️</button>
            <button class="post-action" type="button">🤬</button>
            <button class="post-action" type="button">💕</button>
            <button class="post-action" type="button">💀</button>

            <button class="post-action" type="button">
              分享
            </button>

            <button class="post-action" type="button">
              檢舉
            </button>
          </div>
        </div>
      </article>

      <aside class="related-panel">
        <h2>其他匿名文章</h2>

        <div class="related-list">
          <a class="related-item" href="#">
            <strong>
              離開待了很久的群組後，心裡有點空
            </strong>
            <small>🌸 陪伴模式・Discord 社群</small>
          </a>

          <a class="related-item" href="#">
            <strong>
              要怎麼找到願意長期一起玩的固定夥伴？
            </strong>
            <small>💜 建議模式・遊戲</small>
          </a>
        </div>
      </aside>
    </div>

    <section class="comments-section">
      <h2>匿名留言</h2>

      <form class="comment-form">
        <input
          class="comment-field"
          maxlength="20"
          placeholder="匿名暱稱（可不填）"
        >

        <textarea
          class="comment-field"
          maxlength="500"
          placeholder="留下匿名留言……"
        ></textarea>

        <button class="comment-button" type="button">
          匿名留言・尚未開放
        </button>
      </form>

      <div class="comment-preview">
        目前還沒有公開留言。
      </div>
    </section>
  </main>
</body>
</html>
