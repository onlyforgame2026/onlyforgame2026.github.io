<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>匿名文章全文｜ServerBloom</title>

  <link
    rel="stylesheet"
    href="assets/anonymous.css"
  >

  <style>
    .post-layout {
      display: grid;
      grid-template-columns:
        minmax(0, 1fr)
        minmax(0, 1fr);
      gap: 24px;
      align-items: stretch;
    }

    .post-main,
    .related-panel,
    .comments-section {
      border: 1px solid rgba(207, 165, 255, 0.24);
      border-radius: 22px;

      background:
        radial-gradient(
          circle at 10% 0%,
          rgba(255, 145, 207, 0.12),
          transparent 34%
        ),
        radial-gradient(
          circle at 100% 10%,
          rgba(185, 156, 255, 0.14),
          transparent 36%
        ),
        linear-gradient(
          150deg,
          rgba(35, 24, 56, 0.98),
          rgba(18, 13, 34, 0.98)
        );

      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .post-main,
    .related-panel {
      min-height: 760px;
    }

    .post-main {
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .post-accent {
      height: 10px;
      flex: 0 0 auto;

      background:
        linear-gradient(
          90deg,
          #f58ccc 0%,
          #dc9cf6 48%,
          #a98cff 100%
        );
    }

    .post-body {
      padding: 34px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .post-meta {
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .post-meta .card-label {
      border-color: rgba(211, 173, 255, 0.3);
      color: #f2e7ff;
      background: rgba(190, 146, 255, 0.12);
    }

    .post-title {
      margin: 0;
      overflow-wrap: anywhere;
      color: #fff8fd;
      font-size: clamp(34px, 4.2vw, 56px);
      line-height: 1.28;
      letter-spacing: 0.2px;
    }

    .post-author {
      margin-top: 16px;
      color: #d7cae8;
      font-size: 16px;
    }

    .post-content {
      margin-top: 32px;
      flex: 1;
      overflow-wrap: anywhere;
      color: #f0e9f8;
      font-size: 20px;
      line-height: 2.05;
      white-space: pre-wrap;
    }

    .post-actions {
      margin-top: 36px;
      padding-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 11px;

      border-top:
        1px solid rgba(216, 180, 255, 0.16);
    }

    .post-action {
      min-height: 54px;
      padding: 10px 17px;

      border:
        1px solid rgba(190, 151, 255, 0.3);
      border-radius: 13px;

      color: #f3e9ff;
      background: rgba(14, 10, 29, 0.72);

      font-weight: 750;

      transition:
        transform 0.16s ease,
        border-color 0.16s ease,
        background 0.16s ease;
    }

    .post-action:hover {
      transform: translateY(-2px);
      border-color: rgba(247, 144, 207, 0.58);
      background: rgba(49, 28, 76, 0.92);
    }

    .reaction-button {
      width: 56px;
      min-width: 56px;
      height: 56px;
      padding: 0;

      display: grid;
      place-items: center;

      font-family:
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Noto Color Emoji",
        sans-serif;

      font-size: 25px;
    }

    .related-panel {
      position: sticky;
      top: 82px;

      padding: 28px;

      display: flex;
      flex-direction: column;
    }

    .related-panel h2 {
      margin: 0 0 20px;
      color: #fff6fc;
      font-size: 30px;
    }

    .related-list {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .related-item {
      min-height: 150px;
      padding: 22px;

      display: flex;
      flex-direction: column;
      justify-content: space-between;

      border:
        1px solid rgba(199, 161, 255, 0.22);
      border-radius: 17px;

      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(185, 156, 255, 0.1),
          transparent 45%
        ),
        linear-gradient(
          140deg,
          rgba(255, 147, 211, 0.07),
          rgba(120, 85, 200, 0.07)
        ),
        rgba(8, 7, 22, 0.72);

      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    .related-item:hover {
      transform: translateY(-3px);
      border-color: rgba(244, 143, 207, 0.52);

      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.24);
    }

    .related-item strong {
      display: block;
      overflow-wrap: anywhere;
      color: #fff8fd;
      font-size: 21px;
      line-height: 1.55;
    }

    .related-item small {
      display: block;
      margin-top: 16px;
      color: #d1c1e3;
      font-size: 15px;
      line-height: 1.6;
    }

    .loading-message {
      padding: 28px 18px;

      color: #cdbfe0;
      text-align: center;

      border:
        1px dashed rgba(199, 161, 255, 0.26);
      border-radius: 14px;

      background: rgba(8, 7, 22, 0.42);
    }

    .comments-section {
      min-height: 500px;
      margin-top: 26px;
      padding: 32px;
    }

    .comments-section h2 {
      margin: 0 0 22px;
      color: #fff7fc;
      font-size: 32px;
    }

    .comment-form {
      display: grid;
      gap: 13px;
    }

    .comment-field {
      width: 100%;
      min-height: 54px;
      padding: 14px 16px;

      color: #ffffff;

      border:
        1px solid rgba(198, 160, 255, 0.24);
      border-radius: 13px;
      outline: 0;

      background: rgba(6, 5, 19, 0.86);

      font-size: 16px;

      transition:
        border-color 0.16s ease,
        box-shadow 0.16s ease;
    }

    .comment-field::placeholder {
      color: #9f93b4;
    }

    .comment-field:focus {
      border-color: rgba(244, 143, 207, 0.62);

      box-shadow:
        0 0 0 4px rgba(244, 143, 207, 0.1);
    }

    textarea.comment-field {
      min-height: 190px;
      resize: vertical;
      line-height: 1.8;
    }

    .comment-button {
      min-height: 58px;

      border: 0;
      border-radius: 13px;

      color: #ffffff;

      background:
        linear-gradient(
          135deg,
          #f38bca 0%,
          #cf82f0 48%,
          #8057ff 100%
        );

      font-size: 19px;
      font-weight: 850;

      box-shadow:
        0 12px 26px rgba(133, 83, 255, 0.22);
    }

    .comment-preview {
      margin-top: 26px;
      padding-top: 22px;

      color: #d8cde7;
      font-size: 17px;

      border-top:
        1px solid rgba(213, 175, 255, 0.15);
    }

    @media (max-width: 980px) {
      .post-layout {
        grid-template-columns: 1fr;
      }

      .post-main,
      .related-panel {
        min-height: auto;
      }

      .related-panel {
        position: static;
      }
    }

    @media (max-width: 680px) {
      .post-body,
      .related-panel,
      .comments-section {
        padding: 21px;
      }

      .post-title {
        font-size: 34px;
      }

      .post-content {
        font-size: 17px;
        line-height: 1.92;
      }

      .reaction-button {
        width: 50px;
        min-width: 50px;
        height: 50px;
        font-size: 22px;
      }

      .post-action {
        min-height: 50px;
      }

      .related-item {
        min-height: 130px;
        padding: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .post-action,
      .related-item,
      .comment-field {
        transition: none;
      }
    }
  </style>
</head>

<body id="postPage">

  <header class="anonymous-header">
    <nav class="anonymous-nav">

      <a
        class="anonymous-brand"
        href="./"
      >
        Server<span>Bloom</span> 匿名文章
      </a>

      <a
        class="back-link"
        href="./"
      >
        ← 返回文章列表
      </a>

    </nav>
  </header>

  <main class="anonymous-main">

    <div class="post-layout">

      <article
        class="post-main"
        id="postMain"
      >
        <div
          class="post-accent"
          id="postAccent"
        ></div>

        <div class="post-body">

          <div
            class="post-meta"
            id="postMeta"
          >
            <span class="card-label">
              正在載入文章資料……
            </span>
          </div>

          <h1
            class="post-title"
            id="postTitle"
          >
            正在載入匿名文章……
          </h1>

          <div
            class="post-author"
            id="postAuthor"
          >
            請稍候
          </div>

          <div
            class="post-content"
            id="postContent"
          >
文章內容載入中……
          </div>

          <div class="post-actions">

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="cool"
              aria-label="覺得很酷"
              title="覺得很酷"
            >
              😎
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="smile"
              aria-label="溫暖支持"
              title="溫暖支持"
            >
              😊
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="love"
              aria-label="喜歡"
              title="喜歡"
            >
              ❤️
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="angry"
              aria-label="替作者生氣"
              title="替作者生氣"
            >
              🤬
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="hug"
              aria-label="陪伴與抱抱"
              title="陪伴與抱抱"
            >
              💕
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="skull"
              aria-label="太真實或傻眼"
              title="太真實或傻眼"
            >
              💀
            </button>

            <button
              class="post-action"
              id="shareButton"
              type="button"
            >
              分享
            </button>

            <button
              class="post-action"
              id="reportButton"
              type="button"
            >
              檢舉
            </button>

          </div>
        </div>
      </article>

      <aside class="related-panel">
        <h2>其他匿名文章</h2>

        <div
          class="related-list"
          id="relatedList"
        >
          <div class="loading-message">
            正在載入其他文章……
          </div>
        </div>
      </aside>

    </div>

    <section
      class="comments-section"
      id="commentsSection"
    >
      <h2>匿名留言</h2>

      <form
        class="comment-form"
        id="commentForm"
      >
        <input
          class="comment-field"
          id="commentNickname"
          maxlength="20"
          placeholder="匿名暱稱（可不填）"
        >

        <textarea
          class="comment-field"
          id="commentContent"
          maxlength="500"
          placeholder="留下匿名留言……"
        ></textarea>

        <button
          class="comment-button"
          id="commentButton"
          type="button"
        >
          匿名留言・尚未開放
        </button>
      </form>

      <div
        class="comment-preview"
        id="commentList"
      >
        目前還沒有公開留言。
      </div>
    </section>

  </main>

  <script src="assets/post.js"></script>
</body>
</html>
