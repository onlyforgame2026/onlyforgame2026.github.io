<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>匿名文章全文｜ServerBloom</title>

  <link
    rel="stylesheet"
    href="assets/anonymous.css"
  >

  <style>
    .post-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 22px;
      align-items: start;
    }

    .post-main,
    .related-panel,
    .comments-section {
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(
          150deg,
          rgba(255, 143, 202, 0.07),
          rgba(185, 156, 255, 0.07)
        ),
        var(--panel);
      box-shadow:
        0 16px 36px rgba(0, 0, 0, 0.3);
    }

    .post-main {
      min-width: 0;
      overflow: hidden;
    }

    .post-accent {
      height: 9px;
      background:
        linear-gradient(
          90deg,
          var(--sakura),
          var(--lavender)
        );
    }

    .post-body {
      padding: 28px;
    }

    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .post-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.3;
    }

    .post-author {
      margin-top: 14px;
      color: var(--muted);
    }

    .post-content {
      margin-top: 28px;
      overflow-wrap: anywhere;
      color: #ddd5ea;
      font-size: 17px;
      line-height: 2;
      white-space: pre-wrap;
    }

    .post-actions {
      margin-top: 30px;
      padding-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-top: 1px solid var(--line);
    }

    .post-action {
      min-height: 42px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--lavender-soft);
      background: var(--panel-soft);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease;
    }

    .post-action:hover {
      transform: translateY(-2px);
      border-color: var(--lavender);
      background: rgba(185, 156, 255, 0.12);
    }

    .reaction-button {
      min-width: 48px;
      font-size: 20px;
    }

    .related-panel {
      position: sticky;
      top: 82px;
      padding: 18px;
    }

    .related-panel h2 {
      margin: 0 0 14px;
      font-size: 19px;
    }

    .related-list {
      display: grid;
      gap: 10px;
    }

    .related-item {
      padding: 13px;
      display: block;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(7, 7, 19, 0.58);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease;
    }

    .related-item:hover {
      transform: translateY(-2px);
      border-color: var(--lavender);
    }

    .related-item strong {
      display: block;
      overflow-wrap: anywhere;
      line-height: 1.5;
    }

    .related-item small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
    }

    .comments-section {
      margin-top: 22px;
      padding: 24px;
    }

    .comments-section h2 {
      margin: 0 0 18px;
    }

    .comment-form {
      display: grid;
      gap: 11px;
    }

    .comment-field {
      width: 100%;
      min-height: 46px;
      padding: 11px 13px;
      color: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: 0;
      background: #090819;
    }

    .comment-field:focus {
      border-color: var(--lavender);
      box-shadow:
        0 0 0 3px rgba(185, 156, 255, 0.12);
    }

    textarea.comment-field {
      min-height: 110px;
      resize: vertical;
    }

    .comment-button {
      min-height: 46px;
      border: 0;
      border-radius: 10px;
      color: white;
      background:
        linear-gradient(
          135deg,
          var(--sakura),
          var(--purple)
        );
      font-weight: 850;
    }

    .comment-preview {
      margin-top: 22px;
      padding: 18px 0 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
    }

    .loading-message {
      padding: 14px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 12px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .post-layout {
        grid-template-columns: 1fr;
      }

      .related-panel {
        position: static;
      }
    }

    @media (max-width: 680px) {
      .post-body,
      .comments-section {
        padding: 19px;
      }

      .post-actions {
        gap: 8px;
      }

      .post-action {
        min-height: 44px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .post-action,
      .related-item {
        transition: none;
      }
    }
  </style>
</head>

<body id="postPage">

  <header class="anonymous-header">
    <nav class="anonymous-nav">

      <a
        class="anonymous-brand"
        href="./"
      >
        Server<span>Bloom</span> 匿名文章
      </a>

      <a
        class="back-link"
        href="./"
      >
        ← 返回文章列表
      </a>

    </nav>
  </header>

  <main class="anonymous-main">

    <div class="post-layout">

      <article
        class="post-main"
        id="postMain"
      >
        <div
          class="post-accent"
          id="postAccent"
        ></div>

        <div class="post-body">

          <div
            class="post-meta"
            id="postMeta"
          >
            <span class="card-label">
              正在載入文章資料……
            </span>
          </div>

          <h1
            class="post-title"
            id="postTitle"
          >
            正在載入匿名文章……
          </h1>

          <div
            class="post-author"
            id="postAuthor"
          >
            請稍候
          </div>

          <div
            class="post-content"
            id="postContent"
          >
文章內容載入中……
          </div>

          <div class="post-actions">

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="cool"
              aria-label="覺得很酷"
              title="覺得很酷"
            >
              😎
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="smile"
              aria-label="溫暖支持"
              title="溫暖支持"
            >
              😊
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="love"
              aria-label="喜歡"
              title="喜歡"
            >
              ❤️
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="angry"
              aria-label="替作者生氣"
              title="替作者生氣"
            >
              🤬
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="hug"
              aria-label="陪伴與抱抱"
              title="陪伴與抱抱"
            >
              💕
            </button>

            <button
              class="post-action reaction-button"
              type="button"
              data-reaction="skull"
              aria-label="太真實或傻眼"
              title="太真實或傻眼"
            >
              💀
            </button>

            <button
              class="post-action"
              id="shareButton"
              type="button"
            >
              分享
            </button>

            <button
              class="post-action"
              id="reportButton"
              type="button"
            >
              檢舉
            </button>

          </div>
        </div>
      </article>

      <aside class="related-panel">
        <h2>其他匿名文章</h2>

        <div
          class="related-list"
          id="relatedList"
        >
          <div class="loading-message">
            正在載入其他文章……
          </div>
        </div>
      </aside>

    </div>

    <section
      class="comments-section"
      id="commentsSection"
    >
      <h2>匿名留言</h2>

      <form
        class="comment-form"
        id="commentForm"
      >
        <input
          class="comment-field"
          id="commentNickname"
          maxlength="20"
          placeholder="匿名暱稱（可不填）"
        >

        <textarea
          class="comment-field"
          id="commentContent"
          maxlength="500"
          placeholder="留下匿名留言……"
        ></textarea>

        <button
          class="comment-button"
          id="commentButton"
          type="button"
        >
          匿名留言・尚未開放
        </button>
      </form>

      <div
        class="comment-preview"
        id="commentList"
      >
        目前還沒有公開留言。
      </div>
    </section>

    </main>

  <script src="assets/post.js"></script>
</body>
</html>
