<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07131a">
<title>櫻花記憶地磚｜ServerBloom</title>
<style>
:root{color-scheme:dark;font-family:Inter,"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;--mint:#5ce0c1;--pink:#ff73aa}
*{box-sizing:border-box}body{margin:0;min-height:100vh;color:#fff;background:radial-gradient(circle at 75% -10%,#25366a,transparent 36%),radial-gradient(circle at 10% 70%,#153b3d,transparent 35%),#060b12}
button{font:inherit;color:inherit}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #20303f;background:rgba(6,11,18,.9);backdrop-filter:blur(14px)}
.back{padding:9px 14px;border:1px solid #314556;border-radius:999px;color:#fff;text-decoration:none;background:#101b26}.wrap{width:min(950px,calc(100% - 24px));margin:auto;padding:26px 0 60px}
h1{margin:0;font-size:clamp(30px,5vw,54px)}.lead{color:#adc0cc;line-height:1.7}.stats{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0}.pill{padding:8px 12px;border:1px solid #2b4050;border-radius:999px;background:#0f1a24;font-weight:850}
.game{padding:18px;border:1px solid #294253;border-radius:22px;background:rgba(11,21,29,.92);box-shadow:0 24px 60px rgba(0,0,0,.32)}.message{min-height:50px;display:grid;place-items:center;margin-bottom:16px;padding:10px;text-align:center;border:1px solid #2e4759;border-radius:13px;color:#d7e5ec;background:#0a141d}
.grid{width:min(78vh,680px,100%);aspect-ratio:1;margin:auto;display:grid;gap:7px}.cell{position:relative;border:1px solid #2a4658;border-radius:12px;background:linear-gradient(145deg,#172938,#0b1721);cursor:pointer;transition:.16s ease}
.cell::after{content:"🌸";position:absolute;inset:0;display:grid;place-items:center;font-size:clamp(14px,4vw,34px);opacity:.08;transition:.16s ease}.cell:hover{transform:translateY(-2px);border-color:#5ce0c1}
.cell.flash{border-color:#fff;background:radial-gradient(circle,#fff 0,#ff83bd 25%,#9f62ff 60%,#243455 100%);box-shadow:0 0 28px #ff7eb7}.cell.flash::after{opacity:1;filter:drop-shadow(0 0 12px #fff)}
.cell.selected{border-color:#5ce0c1;background:radial-gradient(circle,#adffe9,#2dc2a2 50%,#153c42);box-shadow:0 0 18px #5ce0c1}.cell.selected::after{opacity:1}
.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-top:16px}.btn{min-height:44px;padding:0 16px;border:1px solid #315064;border-radius:12px;background:#142532;font-weight:900;cursor:pointer}.btn.primary{border:0;background:linear-gradient(135deg,#38cfae,#8b68ff)}.btn:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:600px){.game{padding:12px}.grid{gap:4px}.cell{border-radius:7px}.top{padding:11px 12px}}
</style>
</head>
<body>
<header class="top"><strong>🧠 ServerBloom · Bloom Memory</strong><a class="back" href="../">← 遊戲大廳</a></header>
<main class="wrap">
<h1>櫻花記憶地磚</h1>
<p class="lead">電腦會依序讓數個格子發光。你不用記順序，只要記住哪些格子亮過，示範結束後把它們全部選出來。</p>
<div class="stats"><span class="pill">關卡 <b id="level">1</b></span><span class="pill">棋盤 <b id="size">2×2</b></span><span class="pill">目標 <b id="targetCount">2</b> 格</span><span class="pill">生命 <b id="lives">♥♥♥</b></span><span class="pill">最高關卡 <b id="best">0</b></span></div>
<section class="game">
<div class="message" id="message">按「開始遊戲」觀看第一關示範。</div>
<div class="grid" id="grid"></div>
<div class="controls">
<button class="btn primary" id="start">開始遊戲</button>
<button class="btn" id="repeat" disabled>再看一次</button>
<button class="btn" id="submit" disabled>提交答案</button>
</div>
</section>
</main>
<script>
"use strict";
const BEST_KEY="serverbloom_best_memory";
let level=1,lives=3,target=[],selected=new Set(),phase="idle",repeatUsed=false,timers=[];
const $=s=>document.querySelector(s);
const sleep=ms=>new Promise(resolve=>{const id=setTimeout(resolve,ms);timers.push(id)});
function gridSize(){return Math.min(level+1,9)}
function targetAmount(){return Math.min(level+1,gridSize()**2)}
function clearTimers(){timers.forEach(clearTimeout);timers=[]}
function makeTarget(){
  const total=gridSize()**2;
  const values=Array.from({length:total},(_,i)=>i);
  for(let i=values.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[values[i],values[j]]=[values[j],values[i]]}
  target=values.slice(0,targetAmount());
}
function render(){
  const size=gridSize();
  $("#grid").style.gridTemplateColumns=`repeat(${size},1fr)`;
  $("#grid").innerHTML=Array.from({length:size*size},(_,index)=>`<button class="cell ${selected.has(index)?"selected":""}" data-index="${index}" type="button" aria-label="地磚 ${index+1}"></button>`).join("");
  $("#level").textContent=level;
  $("#size").textContent=`${size}×${size}`;
  $("#targetCount").textContent=targetAmount();
  $("#lives").textContent="♥".repeat(lives)+"♡".repeat(3-lives);
  $("#best").textContent=Number(localStorage.getItem(BEST_KEY)||0);
  $("#submit").disabled=phase!=="answer";
  $("#repeat").disabled=phase!=="answer"||repeatUsed;
}
function message(text){$("#message").textContent=text}
async function demonstrate(){
  phase="demo";selected.clear();render();message("仔細看：櫻花地磚正在依序發光……");
  await sleep(600);
  for(const index of target){
    const cell=document.querySelector(`[data-index="${index}"]`);
    if(!cell)return;
    cell.classList.add("flash");
    await sleep(Math.max(280,620-level*25));
    cell.classList.remove("flash");
    await sleep(150);
  }
  phase="answer";render();message(`請選出剛才亮過的 ${target.length} 個格子，順序不重要。`);
}
function startGame(){
  clearTimers();level=1;lives=3;repeatUsed=false;makeTarget();demonstrate();
  $("#start").textContent="重新開始";
}
function nextLevel(){
  level++;
  localStorage.setItem(BEST_KEY,String(Math.max(Number(localStorage.getItem(BEST_KEY)||0),level-1)));
  repeatUsed=false;selected.clear();makeTarget();render();
  message(`答對了！準備進入第 ${level} 關。`);
  sleep(900).then(demonstrate);
}
function submit(){
  if(phase!=="answer")return;
  const correct=selected.size===target.length&&target.every(index=>selected.has(index));
  if(correct){phase="transition";render();nextLevel();return}
  lives--;selected.clear();
  if(lives<=0){
    phase="idle";
    localStorage.setItem(BEST_KEY,String(Math.max(Number(localStorage.getItem(BEST_KEY)||0),level-1)));
    render();message(`遊戲結束，你完成到第 ${level-1} 關。按「重新開始」再挑戰。`);
    return;
  }
  phase="transition";render();message(`答案不正確，剩下 ${lives} 條生命。再看一次示範。`);
  sleep(900).then(demonstrate);
}
$("#grid").addEventListener("click",event=>{
  const cell=event.target.closest("[data-index]");if(!cell||phase!=="answer")return;
  const index=Number(cell.dataset.index);
  selected.has(index)?selected.delete(index):selected.add(index);
  render();
});
$("#start").addEventListener("click",startGame);
$("#repeat").addEventListener("click",()=>{if(phase!=="answer"||repeatUsed)return;repeatUsed=true;demonstrate()});
$("#submit").addEventListener("click",submit);
render();
</script>
</body>
</html>
