<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#120b1a">
<title>櫻花拉密｜ServerBloom</title>
<style>
:root{color-scheme:dark;font-family:Inter,"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;--pink:#ff77ad;--violet:#9b6cff;--panel:#151125;--line:#392f53}
*{box-sizing:border-box}body{margin:0;min-height:100vh;color:#fff;background:radial-gradient(circle at 80% 0,#4a1747 0,transparent 35%),radial-gradient(circle at 10% 60%,#1c3751 0,transparent 34%),#090711}
button{font:inherit;color:inherit}.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;border-bottom:1px solid #2d2540;background:rgba(9,7,17,.9);backdrop-filter:blur(16px)}
.brand{font-weight:950}.back{padding:9px 14px;border:1px solid #403653;border-radius:999px;color:#fff;text-decoration:none;background:#171321}
.wrap{width:min(1180px,calc(100% - 24px));margin:auto;padding:24px 0 60px}.hero h1{margin:0;font-size:clamp(30px,5vw,54px)}.hero p{max-width:820px;color:#c4b9d0;line-height:1.7}
.stats{display:flex;flex-wrap:wrap;gap:9px;margin:18px 0}.pill{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:#171321;font-weight:800}
.panel{margin-top:14px;padding:18px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(145deg,rgba(27,20,43,.97),rgba(13,10,23,.97));box-shadow:0 20px 50px rgba(0,0,0,.32)}
.panel h2{margin:0 0 12px;font-size:19px}.message{min-height:48px;display:flex;align-items:center;padding:11px 14px;border:1px solid #403654;border-radius:12px;color:#eadff1;background:#0f0c19}
.table-groups{display:flex;flex-wrap:wrap;gap:12px;min-height:88px}.group{display:flex;flex-wrap:wrap;gap:6px;padding:9px;border:1px solid #493e60;border-radius:13px;background:#0e0b17}
.rack{display:flex;flex-wrap:wrap;gap:8px;min-height:92px}.tile{position:relative;width:58px;height:82px;border:2px solid rgba(255,255,255,.18);border-radius:10px;color:#fff;background:#f4f1e9;box-shadow:0 8px 18px rgba(0,0,0,.3);cursor:pointer;transition:.16s ease}
.tile:hover{transform:translateY(-3px)}.tile.selected{transform:translateY(-12px);border-color:#fff;box-shadow:0 0 0 3px var(--pink),0 14px 25px rgba(0,0,0,.45)}
.tile strong{position:absolute;left:8px;top:6px;font-size:21px}.tile span{position:absolute;right:7px;bottom:6px;font-size:12px;font-weight:900}.tile.red{color:#f04462}.tile.blue{color:#288df0}.tile.yellow{color:#d39d19}.tile.black{color:#24202b}.tile.joker{color:#7c43da;background:linear-gradient(145deg,#fff,#e7dcff)}
.controls{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}.btn{min-height:44px;padding:0 15px;border:1px solid #493d62;border-radius:12px;background:#211a31;font-weight:900;cursor:pointer}.btn.primary{border:0;background:linear-gradient(135deg,#ff5f9d,#8c5cff)}.btn:hover{filter:brightness(1.12)}
.rules{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}.rule{padding:13px;border:1px solid #352d49;border-radius:14px;color:#c9bfd5;background:#110e1b;line-height:1.55}.rule strong{display:block;margin-bottom:4px;color:#fff}
@media(max-width:700px){.rules{grid-template-columns:1fr}.tile{width:48px;height:70px}.tile strong{font-size:18px}.panel{padding:14px}.top{padding:11px 12px}}
</style>
</head>
<body>
<header class="top"><div class="brand">🌸 ServerBloom · Bloom Rummy</div><a class="back" href="../">← 遊戲大廳</a></header>
<main class="wrap">
<section class="hero"><h1>櫻花拉密</h1><p>單機版拉密牌：選取至少 3 張牌，讓系統檢查是否為「同色連續順組」或「同數字異色組」。第一次出牌必須達到 30 分。</p></section>
<div class="stats"><span class="pill">手牌 <b id="handCount">14</b></span><span class="pill">牌堆 <b id="deckCount">0</b></span><span class="pill">分數 <b id="score">0</b></span><span class="pill">最高分 <b id="best">0</b></span></div>
<section class="panel"><h2>桌面牌組</h2><div class="table-groups" id="table"></div></section>
<section class="panel"><h2>你的牌架</h2><div class="message" id="message">選取牌後，按「檢查並出牌」。</div><div class="rack" id="rack"></div>
<div class="controls">
<button class="btn primary" id="play">檢查並出牌</button>
<button class="btn" id="draw">抽一張</button>
<button class="btn" id="sortColor">依顏色排序</button>
<button class="btn" id="sortNumber">依數字排序</button>
<button class="btn" id="newGame">重新洗牌</button>
</div></section>
<div class="rules">
<div class="rule"><strong>同數字組</strong>至少 3 張相同數字，但顏色不能重複。</div>
<div class="rule"><strong>同色順組</strong>至少 3 張相同顏色，而且數字必須連續。</div>
<div class="rule"><strong>破冰規則</strong>第一次成功出牌的牌面總和必須達到 30 分。</div>
</div>
</main>
<script>
"use strict";
const COLORS=[
  {id:"red",label:"紅",order:0},
  {id:"blue",label:"藍",order:1},
  {id:"yellow",label:"黃",order:2},
  {id:"black",label:"黑",order:3}
];
const BEST_KEY="serverbloom_best_rummy";
let deck=[],hand=[],groups=[],selected=new Set(),opened=false,score=0,uid=0;
const $=s=>document.querySelector(s);
const shuffle=array=>{for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]]}return array};
function makeDeck(){
  uid=0;
  const tiles=[];
  for(let copy=0;copy<2;copy++)for(const color of COLORS)for(let number=1;number<=13;number++)tiles.push({uid:++uid,color:color.id,number,joker:false});
  tiles.push({uid:++uid,color:"joker",number:0,joker:true},{uid:++uid,color:"joker",number:0,joker:true});
  return shuffle(tiles);
}
function drawTiles(count=1){
  for(let i=0;i<count&&deck.length;i++)hand.push(deck.pop());
}
function tileHTML(tile){
  return `<button class="tile ${tile.joker?"joker":tile.color} ${selected.has(tile.uid)?"selected":""}" data-id="${tile.uid}" type="button">
    <strong>${tile.joker?"★":tile.number}</strong><span>${tile.joker?"JOKER":tile.color.toUpperCase()}</span>
  </button>`;
}
function render(){
  $("#rack").innerHTML=hand.map(tileHTML).join("");
  $("#table").innerHTML=groups.length?groups.map(group=>`<div class="group">${group.map(tileHTML).join("")}</div>`).join(""):'<span style="color:#887d96">尚未出牌</span>';
  $("#handCount").textContent=hand.length;
  $("#deckCount").textContent=deck.length;
  $("#score").textContent=score;
  $("#best").textContent=Number(localStorage.getItem(BEST_KEY)||0);
}
function selectedTiles(){return hand.filter(tile=>selected.has(tile.uid))}
function validateSet(tiles){
  if(tiles.length<3||tiles.length>4)return false;
  const normal=tiles.filter(tile=>!tile.joker);
  if(!normal.length)return false;
  if(!normal.every(tile=>tile.number===normal[0].number))return false;
  return new Set(normal.map(tile=>tile.color)).size===normal.length;
}
function validateRun(tiles){
  if(tiles.length<3||tiles.length>13)return false;
  const normal=tiles.filter(tile=>!tile.joker);
  if(!normal.length)return false;
  if(!normal.every(tile=>tile.color===normal[0].color))return false;
  const numbers=normal.map(tile=>tile.number).sort((a,b)=>a-b);
  if(new Set(numbers).size!==numbers.length)return false;
  let gaps=0;
  for(let i=1;i<numbers.length;i++)gaps+=numbers[i]-numbers[i-1]-1;
  const jokers=tiles.length-normal.length;
  if(gaps>jokers)return false;
  const unused=jokers-gaps;
  const room=(numbers[0]-1)+(13-numbers[numbers.length-1]);
  return unused<=room;
}
function setMessage(text,good=false){
  $("#message").textContent=text;
  $("#message").style.borderColor=good?"#4bd98a":"#403654";
}
function submitGroup(){
  const tiles=selectedTiles();
  if(!(validateSet(tiles)||validateRun(tiles))){setMessage("這組牌不合法：至少 3 張，必須是同數字異色組，或同色連續順組。");return}
  const total=tiles.reduce((sum,tile)=>sum+(tile.joker?0:tile.number),0);
  if(!opened&&total<30){setMessage(`第一次出牌只有 ${total} 分，還沒達到 30 分。`);return}
  opened=true;
  groups.push(tiles);
  hand=hand.filter(tile=>!selected.has(tile.uid));
  selected.clear();
  score+=total+tiles.length*10;
  const best=Math.max(Number(localStorage.getItem(BEST_KEY)||0),score);
  localStorage.setItem(BEST_KEY,String(best));
  if(!hand.length)setMessage(`你清空手牌了！本局 ${score} 分 🌸`,true);
  else setMessage(`合法出牌！這組 ${total} 點，繼續清空牌架。`,true);
  render();
}
function start(){
  deck=makeDeck();hand=[];groups=[];selected.clear();opened=false;score=0;drawTiles(14);
  setMessage("新局開始：先完成總點數至少 30 的合法牌組。");
  sortBy("number");
}
function sortBy(mode){
  const colorOrder=Object.fromEntries(COLORS.map(color=>[color.id,color.order]));
  hand.sort((a,b)=>{
    if(a.joker!==b.joker)return a.joker?1:-1;
    if(mode==="color")return colorOrder[a.color]-colorOrder[b.color]||a.number-b.number;
    return a.number-b.number||colorOrder[a.color]-colorOrder[b.color];
  });
  render();
}
$("#rack").addEventListener("click",event=>{
  const button=event.target.closest("[data-id]");if(!button)return;
  const id=Number(button.dataset.id);
  selected.has(id)?selected.delete(id):selected.add(id);
  render();
});
$("#play").addEventListener("click",submitGroup);
$("#draw").addEventListener("click",()=>{if(!deck.length){setMessage("牌堆已經空了。");return}drawTiles(1);selected.clear();setMessage("抽了一張牌。");render()});
$("#sortColor").addEventListener("click",()=>sortBy("color"));
$("#sortNumber").addEventListener("click",()=>sortBy("number"));
$("#newGame").addEventListener("click",start);
start();
</script>
</body>
</html>
